<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Usuario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f4f6f8;
      --card-bg: #ffffff;
      --primary: #1f3c88;
      --primary-soft: #eef2fb;
      --text-main: #1f2933;
      --text-muted: #6b7280;
      --border: #d1d5db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text-main);
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--primary-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: 600;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow:
        0 18px 45px rgba(15, 23, 42, 0.09),
        0 0 0 1px rgba(148, 163, 184, 0.18);
    }

    h2 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .field input {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
      background-color: #f9fafb;
    }

    .field input::placeholder {
      color: #9ca3af;
    }

    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(31, 60, 136, 0.12);
      background-color: #ffffff;
    }

    button[type="submit"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.06s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 24px rgba(31, 60, 136, 0.35);
    }

    button[type="submit"]:hover {
      background: #172c6a;
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(31, 60, 136, 0.4);
    }

    button[type="submit"]:active {
      transform: translateY(0);
      box-shadow: 0 10px 24px rgba(31, 60, 136, 0.3);
    }

    .footer-link {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 12px;
    }

    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="brand">
      <div class="brand-mark">👤</div>
      <div class="brand-name">Admin</div>
    </div>

    <div class="card">
      <h2>Crear usuario</h2>
      <p class="subtitle">Registra un nuevo usuario para la plataforma corporativa.</p>

      <form method="POST">
        <div class="field">
          <label for="username">Nombre de usuario</label>
          <input id="username" name="username" placeholder="usuario@empresa.com" required>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="Contraseña segura" required>
        </div>

        <div class="actions">
          <button type="submit">Crear usuario</button>
        </div>
      </form>

      <p class="footer-link">
        <a href="/dashboard">⬅ Volver al dashboard</a>
      </p>
    </div>
  </div>
</body>
</html>
