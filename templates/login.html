<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Microgeo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f4f6f8;
      --card-bg: #ffffff;
      --primary: #1a5f38;
      --primary-soft: #e8f5e8;
      --text-main: #1f2933;
      --text-muted: #6b7280;
      --border: #d1d5db;
      --danger: #e11d48;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #f4f6f8 100%);
      color: var(--text-main);
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--primary-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: 700;
      font-size: 24px;
      margin-bottom: 8px;
      box-shadow: 0 8px 24px rgba(26, 95, 56, 0.15);
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--primary);
      position: relative;
    }

    .brand-name::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 2px;
      background: var(--primary);
      border-radius: 1px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow:
        0 24px 56px rgba(15, 23, 42, 0.12),
        0 0 0 1px rgba(148, 163, 184, 0.18);
      border: 1px solid rgba(26, 95, 56, 0.08);
    }

    h2 {
      font-size: 24px;
      margin-bottom: 6px;
      color: var(--primary);
      font-weight: 700;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 14px;
      color: var(--text-main);
      font-weight: 500;
    }

    .field input {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 15px;
      transition: all 0.2s ease;
      background-color: #f9fafb;
    }

    .field input::placeholder {
      color: #9ca3af;
    }

    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 95, 56, 0.08);
      background-color: #ffffff;
    }

    .actions {
      margin-top: 12px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 12px 28px rgba(26, 95, 56, 0.3);
    }

    button[type="submit"]:hover {
      background: #134b2a;
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(26, 95, 56, 0.35);
    }

    button[type="submit"]:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(26, 95, 56, 0.25);
    }

    .footer-link {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 16px;
    }

    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
        margin: 0 12px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="brand">
      <div class="brand-mark">μG</div>
      <div class="brand-name">Microgeo</div>
    </div>

    <div class="card">
      <h2>Login</h2>
      <p class="subtitle">Accede a tu panel de gestión de inventario y solicitudes corporativas.</p>

      <form method="POST">
        <div class="field">
          <label for="username">Usuario o correo</label>
          <input id="username" name="username" placeholder="usuario@microgeo.cl">
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="Ingresa tu contraseña">
        </div>

        <div class="actions">
          <button type="submit">Ingresar</button>
        </div>
      </form>

      <p class="footer-link">
        ¿Aún no tienes cuenta?
        <a href="/registro">Crear cuenta</a>
      </p>
    </div>
  </div>
</body>
</html>
